<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BTC 收益追踪</title>
  <meta name="description" content="BTC 实时投资收益追踪" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060910;
      --surface: #0f1624;
      --surface2: #162030;
      --border: #1c2c42;
      --accent: #f7931a;
      --accent2: #ff6b35;
      --green: #22c55e;
      --green-dim: rgba(34,197,94,.12);
      --red: #ef4444;
      --red-dim: rgba(239,68,68,.12);
      --text: #e2e8f0;
      --muted: #4a6080;
      --radius: 20px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* 背景光晕 */
    body::before {
      content: '';
      position: fixed;
      top: -300px; left: 50%;
      transform: translateX(-50%);
      width: 800px; height: 600px;
      background: radial-gradient(ellipse, rgba(247,147,26,.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .wrap {
      width: 100%;
      max-width: 520px;
      position: relative;
      z-index: 1;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 40px;
    }
    .logo-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px;
      margin: 0 auto 20px;
      box-shadow: 0 0 40px rgba(247,147,26,.35), 0 0 80px rgba(247,147,26,.1);
    }
    h1 {
      font-size: 1.9rem;
      font-weight: 800;
      background: linear-gradient(135deg, #f7931a 0%, #ff6b35 50%, #ffd700 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -.02em;
    }
    .subtitle {
      color: var(--muted);
      margin-top: 8px;
      font-size: .88rem;
    }

    /* ── 输入框 ── */
    .input-wrap {
      position: relative;
      margin-bottom: 28px;
    }
    .input-hint {
      font-size: .72rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .1em;
      margin-bottom: 10px;
    }
    #code-input {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-family: 'Inter', monospace;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: .15em;
      text-align: center;
      text-transform: uppercase;
      padding: 20px;
      outline: none;
      transition: border-color .25s, box-shadow .25s;
    }
    #code-input::placeholder { color: var(--border); font-size: 1.2rem; letter-spacing: .05em; }
    #code-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(247,147,26,.12);
    }
    #code-input.valid-bb { border-color: #6366f1; box-shadow: 0 0 0 4px rgba(99,102,241,.12); }
    #code-input.valid-hw { border-color: #a855f7; box-shadow: 0 0 0 4px rgba(168,85,247,.12); }

    /* ── 结果卡片 ── */
    #result-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity .35s ease, transform .35s ease;
      pointer-events: none;
    }
    #result-card.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    /* 顶部色条 */
    .card-bar {
      height: 4px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }
    .card-bar.bb { background: linear-gradient(90deg, #6366f1, #818cf8); }
    .card-bar.hw { background: linear-gradient(90deg, #a855f7, #d946ef); }

    .card-body { padding: 28px 28px 24px; }

    /* 标识 */
    .mode-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 5px 14px;
      border-radius: 30px;
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .06em;
      margin-bottom: 20px;
    }
    .mode-badge.bb { background: rgba(99,102,241,.15); color: #818cf8; border: 1px solid rgba(99,102,241,.3); }
    .mode-badge.hw { background: rgba(168,85,247,.15); color: #d946ef; border: 1px solid rgba(168,85,247,.3); }
    .dot { width: 7px; height: 7px; border-radius: 50%; animation: pulse 1.6s infinite; }
    .bb .dot { background: #818cf8; }
    .hw .dot { background: #d946ef; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* 主收益率 */
    .pnl-main {
      text-align: center;
      padding: 20px 0 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .pnl-label {
      font-size: .75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 10px;
    }
    .pnl-value {
      font-size: 3.5rem;
      font-weight: 800;
      letter-spacing: -.03em;
      line-height: 1;
    }
    .pnl-value.pos { color: var(--green); }
    .pnl-value.neg { color: var(--red); }
    .pnl-sub {
      font-size: .85rem;
      color: var(--muted);
      margin-top: 10px;
    }

    /* 明细行 */
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .detail-item {
      background: var(--surface2);
      border-radius: 12px;
      padding: 14px 16px;
    }
    .detail-item.full { grid-column: 1 / -1; }
    .d-label {
      font-size: .7rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: 6px;
    }
    .d-value {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
    }
    .d-value.pos { color: var(--green); }
    .d-value.neg { color: var(--red); }
    .d-value.accent { color: var(--accent); }

    /* 更新时间 */
    .update-time {
      text-align: center;
      font-size: .72rem;
      color: var(--muted);
      margin-top: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .live-dot {
      width: 6px; height: 6px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 1.6s infinite;
    }

    /* 错误 */
    #err {
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.25);
      color: var(--red);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: .85rem;
      margin-bottom: 16px;
      display: none;
    }

    /* 刷新按钮 */
    .btn-refresh {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      margin-top: 16px;
      padding: 11px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      font-family: inherit;
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }
    .btn-refresh:disabled { opacity: .4; cursor: not-allowed; }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: .72rem;
      margin-top: 28px;
    }
    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo-icon">₿</div>
    <h1>BTC 收益追踪</h1>
    <p class="subtitle">输入代号，建议一个季度查询一次</p>
  </header>

  <div class="input-wrap">
    <div class="input-hint">输入代号</div>
    <input id="code-input" type="text" maxlength="2" placeholder="" autocomplete="off" spellcheck="false" />
  </div>

  <div id="err"></div>

  <div id="result-card">
    <div class="card-bar" id="card-bar"></div>
    <div class="card-body">
      <div class="mode-badge" id="mode-badge">
        <span class="dot"></span>
        <span id="mode-label">—</span>
      </div>

      <div class="pnl-main">
        <div class="pnl-label">当前投资收益率</div>
        <div class="pnl-value" id="pnl-value">—</div>
        <div class="pnl-sub" id="pnl-sub">—</div>
      </div>

      <div class="detail-grid">
        <div class="detail-item">
          <div class="d-label">成本（人民币）</div>
          <div class="d-value accent" id="d-cost">—</div>
        </div>
        <div class="detail-item">
          <div class="d-label">当前资产价值（人民币）</div>
          <div class="d-value" id="d-asset">—</div>
        </div>
        <div class="detail-item">
          <div class="d-label">BTC 实时价格（人民币）</div>
          <div class="d-value accent" id="d-btcprice">—</div>
        </div>
        <div class="detail-item">
          <div class="d-label">持仓系数</div>
          <div class="d-value" id="d-factor">—</div>
        </div>
        <div class="detail-item full">
          <div class="d-label">盈亏金额（人民币）</div>
          <div class="d-value" id="d-pnlamount">—</div>
        </div>
      </div>

      <button class="btn-refresh" id="refresh-btn" onclick="refresh()">
        <span id="refresh-icon">↻</span> 刷新实时价格
      </button>

      <div class="update-time">
        <span class="live-dot"></span>
        <span id="update-time-text">—</span>
      </div>
    </div>
  </div>

  <footer>
    数据来源：<a href="https://www.coingecko.com" target="_blank">CoinGecko</a> · 仅供参考，不构成投资建议
  </footer>
</div>

<script>
  const MODES = {
    BB: { label: 'BB', cost: 50000,  factor: 0.10604 },
    HW: { label: 'HW', cost: 200000, factor: 0.40186 },
  };

  let currentMode = null;

  function fmtCNY(n) {
    return '¥' + n.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  function fmtPct(n) {
    return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
  }

  function showErr(msg) {
    const el = document.getElementById('err');
    el.textContent = '❌ ' + msg;
    el.style.display = 'block';
  }
  function hideErr() {
    document.getElementById('err').style.display = 'none';
  }

  async function fetchBtcCny() {
    const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=cny');
    if (!res.ok) throw new Error(`API 返回 ${res.status}，请稍后重试`);
    const data = await res.json();
    return data.bitcoin.cny;
  }

  function render(mode, btcCny) {
    const cfg = MODES[mode];
    const assetValue = btcCny * cfg.factor;
    const pnl = assetValue - cfg.cost;
    const pnlPct = pnl / cfg.cost * 100;
    const isPos = pnl >= 0;

    // 卡片颜色
    const cls = mode.toLowerCase();
    document.getElementById('card-bar').className = `card-bar ${cls}`;
    const badge = document.getElementById('mode-badge');
    badge.className = `mode-badge ${cls}`;
    document.getElementById('mode-label').textContent = cfg.label + ' 模式';

    // 主收益率
    const pnlEl = document.getElementById('pnl-value');
    pnlEl.textContent = fmtPct(pnlPct);
    pnlEl.className = 'pnl-value ' + (isPos ? 'pos' : 'neg');
    document.getElementById('pnl-sub').textContent =
      isPos ? '🎉 投资盈利' : '📉 投资亏损';

    // 明细
    document.getElementById('d-cost').textContent = fmtCNY(cfg.cost);
    const assetEl = document.getElementById('d-asset');
    assetEl.textContent = fmtCNY(assetValue);
    assetEl.className = 'd-value ' + (isPos ? 'pos' : 'neg');
    document.getElementById('d-btcprice').textContent = fmtCNY(btcCny);
    document.getElementById('d-factor').textContent = cfg.factor.toString();
    const amtEl = document.getElementById('d-pnlamount');
    amtEl.textContent = (isPos ? '+' : '') + fmtCNY(pnl);
    amtEl.className = 'd-value ' + (isPos ? 'pos' : 'neg');

    // 时间
    const now = new Date().toLocaleString('zh-CN', { hour12: false });
    document.getElementById('update-time-text').textContent = `更新于 ${now}`;
  }

  async function loadMode(mode) {
    hideErr();
    currentMode = mode;
    document.getElementById('refresh-btn').disabled = true;
    document.getElementById('refresh-icon').textContent = '⏳';

    try {
      const btcCny = await fetchBtcCny();
      render(mode, btcCny);
      document.getElementById('result-card').classList.add('show');
    } catch (e) {
      showErr(e.message);
    } finally {
      document.getElementById('refresh-btn').disabled = false;
      document.getElementById('refresh-icon').textContent = '↻';
    }
  }

  async function refresh() {
    if (currentMode) await loadMode(currentMode);
  }

  // 输入监听
  const input = document.getElementById('code-input');
  input.addEventListener('input', () => {
    const val = input.value.trim().toUpperCase();
    input.className = '';
    document.getElementById('result-card').classList.remove('show');

    if (val === 'BB') {
      input.classList.add('valid-bb');
      loadMode('BB');
    } else if (val === 'HW') {
      input.classList.add('valid-hw');
      loadMode('HW');
    }
  });

  // 恢复上次输入
  window.addEventListener('load', () => {
    const saved = localStorage.getItem('btc_mode');
    if (saved && MODES[saved]) {
      input.value = saved;
      input.classList.add('valid-' + saved.toLowerCase());
      loadMode(saved);
    }
  });
  input.addEventListener('change', () => {
    const val = input.value.trim().toUpperCase();
    if (MODES[val]) localStorage.setItem('btc_mode', val);
  });
</script>
</body>
</html>
